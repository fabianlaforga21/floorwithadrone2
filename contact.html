<!DOCTYPE html>

<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Playfair+Display:wght@500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

<body>

  <!-- ============ HEADER ============ -->

      <ul class="nav-links">

  <!-- ============ CONTACT ============ -->
  <section class="contact">
    <div class="wrap">
      <div class="reveal">
        <h1>Let's get in touch!</h1>
        <p class="lead">Get in touch with us for any enquiries or questions.</p>
        <input class="field" type="text" placeholder="Your name" aria-label="Naam" />
        <input class="field" type="email" placeholder="Your e-mail" aria-label="E-mail" />
      </div>

      <div class="message-card reveal">
        <textarea class="field" placeholder="Your message..." aria-label="Bericht"></textarea>
        <a class="btn" href="mailto:Pasmanfloor@gmail.com">Send message</a>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
